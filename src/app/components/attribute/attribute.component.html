<fs-chip
    [removable]="removable"
    [selectable]="selectable"
    [selected]="selected"
    [backgroundColor]="attributeModel?.backgroundColor"
    [color]="attributeModel?.color"
    [image]="attributeModel?.image"
    [size]="size"
    (selectedToggled)="selectedToggled.emit($event)"
    [value]="attributeModel">
  <ng-content></ng-content>
</fs-chip>
